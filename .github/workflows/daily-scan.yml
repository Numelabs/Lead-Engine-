name: Daily Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"  # 07:00 UTC daily

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Discovery
        run: |
          python discovery.py

      - name: Evidence packs + report
        run: |
          python evidence.py

      - name: Shortlist
        run: |
          python shortlist.py

      - name: Build LLM input
        run: |
          python llm_input_builder.py

      - name: Commit updates
        run: |
          git config user.name "nume-lead-engine-bot"
          git config user.email "bot@nume.local"
          git add docs/*.json docs/LLM_INPUT.md candidates.csv snapshots evidence_packs || true
          git commit -m "Daily update" || echo "No changes"
          git push
