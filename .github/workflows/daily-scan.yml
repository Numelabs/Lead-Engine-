name: Daily Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"  # 07:00 UTC daily

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Discovery
        run: python discovery.py

      - name: Evidence packs + report
        run: python evidence.py

      - name: Shortlist
        run: python shortlist.py

      - name: Build LLM input
        run: python llm_input_builder.py

      - name: Commit updates
        run: |
          git config user.name "nume-lead-engine-bot"
          git config user.email "bot@nume.local"

          git add docs/*.json docs/LLM_INPUT.md candidates.csv snapshots evidence_packs || true

          git status
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Daily update"
          git push origin HEAD:${{ github.ref_name }}
