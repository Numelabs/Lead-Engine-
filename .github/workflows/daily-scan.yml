name: Daily Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"  # 07:00 UTC daily

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner
        run: |
          python scanner.py

      - name: Commit updates
        run: |
          git config user.name "nume-lead-engine-bot"
          git config user.email "bot@nume.local"
          git add docs/report.json snapshots || true
          git commit -m "Update daily report" || echo "No changes"
          git push
