<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nume Lead Engine</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#0f1620;
      --line:rgba(255,255,255,.09);
      --text:#e9eef6;
      --muted:rgba(233,238,246,.7);
      --pill:rgba(255,255,255,.08);
      --accent:#9ad7ff;
    }
    body{ margin:0; font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:var(--text); }
    .wrap{ max-width: 980px; margin: 0 auto; padding: 22px 16px 60px; }
    h1{ font-size: 22px; margin: 0 0 6px; letter-spacing:.2px; }
    h2{ font-size: 16px; margin: 22px 0 10px; color: var(--muted); font-weight:600; }
    .meta{ color: var(--muted); font-size: 13px; margin-bottom: 10px; }
    .card{ background:var(--panel); border:1px solid var(--line); border-radius: 14px; padding: 14px; margin: 10px 0; }
    .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .brand{ font-weight:700; letter-spacing:.2px; }
    .pill{ background:var(--pill); border:1px solid var(--line); border-radius:999px; padding:4px 10px; font-size: 12px; color: var(--muted); }
    a{ color: var(--accent); text-decoration:none; }
    a:hover{ text-decoration:underline; }
    details{ margin-top: 10px; }
    summary{ cursor:pointer; color: var(--muted); }
    textarea{ width:100%; min-height: 92px; background:#0b121a; color:var(--text); border:1px solid var(--line); border-radius: 10px; padding:10px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    .contact{ font-size: 13px; color: var(--muted); }
    .divider{ height:1px; background:var(--line); margin:10px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Nume Lead Engine</h1>
    <div class="meta" id="meta">Loading…</div>

    <h2>Top 5 today</h2>
    <div id="top"></div>

    <h2>All brands</h2>
    <div id="all"></div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
